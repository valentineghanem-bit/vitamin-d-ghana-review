name: CI — Lint and Validate

on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libgdal-dev libgeos-dev libproj-dev libspatialindex-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile scripts/spatial_analysis.py scripts/decision_tree.py scripts/analysis_pipeline.py app.py

      - name: Run tests
        run: pytest tests/ -v --tb=short || echo "No tests found — skipping"

      - name: Dependency check
        run: pip check
