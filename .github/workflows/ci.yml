name: CI — Lint, Test, and Validate

on:
 push:
 branches: [main, develop]
 pull_request:
 branches: [main]

jobs:
 test:
 runs-on: ubuntu-latest
 steps:
 - uses: actions/checkout@v4

 - name: Set up Python 3.11
 uses: actions/setup-python@v5
 with:
 python-version: "3.11"

 - name: Install system dependencies
 run: |
 sudo apt-get update
 sudo apt-get install -y libgdal-dev libgeos-dev libproj-dev libspatialindex-dev

 - name: Install Python dependencies
 run: pip install -r requirements.txt

 - name: Lint with flake8
 run: |
 pip install flake8
 flake8 scripts/ app.py --max-line-length=120 --ignore=E501,W503

 - name: Syntax check all scripts
 run: |
 python -m py_compile scripts/spatial_analysis.py
 python -m py_compile scripts/decision_tree.py
 python -m py_compile scripts/analysis_pipeline.py
 python -m py_compile app.py

 - name: Run unit tests
 run: pytest tests/ -v --tb=short

 - name: Check pip dependency resolution
 run: pip check
